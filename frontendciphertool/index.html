<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <meta name="keywords"

    <link rel="stylesheet" href="./0_zhuyeyangshi.css">
    <link rel="stylesheet" href="./model/2_damoxing.css">

    <aside class="sidebar" id="sidebar">

        <a href="#jiamishiyanshi" class="menu-item" data-target="jiamishiyanshi">
            <div class="menu-icon"></div><span class="menu-text">加密实验室</span>
        </a>
        <a href="#electroniclab" class="menu-item" data-target="electroniclab">
            <div class="menu-icon"></div><span class="menu-text">电子实验室</span>
        </a>
        <a href="#workflow" class="menu-item" data-target="workflow">
            <div class="menu-icon"></div><span class="menu-text">WorkFlow</span>
        </a>
        <a href="#zhishitupu" class="menu-item" data-target="zhishitupu">
            <div class="menu-icon"></div><span class="menu-text">知识图谱</span>

    <div class="container1">
        <div id="jiamishiyanshi-container"></div>

        <div id="zhishitupu-container"></div>

    <!-- 使用说明弹窗结构 -->
    <div id="usageModal" class="usage-modal-overlay">
        <div class="usage-modal-content">
            <img src="./cipher/shiyongshuoming111.png" alt="使用说明" class="usage-modal-img">
        </div>
    </div>
    <!-- 通用图片预览弹窗 -->
    <div id="imagePreviewModal" class="usage-modal-overlay">
        <div class="usage-modal-content">
            <img id="previewImage" src="" alt="预览图片" class="usage-modal-img">
        </div>
    </div>

    <!-- 全局助手 Agent Master -->
    <div id="agent-master-wrapper">
        <div id="agent-chat-window">
            <div class="agent-chat-header">
                <span>PzM assistant</span>
                <button id="agent-collapse-btn" class="agent-collapse-btn">Collapse</button>
            </div>
            <div class="agent-chat-history" id="agent-chat-history"></div>
        </div>

        <div class="agent-suggestions">
            <button class="agent-suggestion-btn">如何用大模型辅助破解恩尼格玛密码机？</button>
            <button class="agent-suggestion-btn">帮我设计一个简单的 555 定时器电路</button>
            <button class="agent-suggestion-btn">在 CTF 比赛中常见的哈希逆向套路有哪些？</button>
            <button class="agent-suggestion-btn">在 CTF 比赛中常见的哈希逆向套路有哪些？</button>
        </div>

        <div class="agent-input-container">
            <textarea id="agent-textarea" placeholder="Reply..." rows="1"></textarea>
            <button id="agent-submit-btn" class="agent-submit-btn" aria-label="收纳助手">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M8 13h8"></path>
                    <path d="M10 10l2 3 2-3"></path>
                </svg>
            </button>
        </div>
    </div>

    <script src="./loginsystem/tanchuangshengming.js"></script>
