server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  datasource:
    url: ${CIPHERTOOL_DB_URL:jdbc:h2:file:~/.ciphertool/ciphertool;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: ${CIPHERTOOL_DB_DRIVER:org.h2.Driver}
    username: ${CIPHERTOOL_DB_USERNAME:sa}
    password: ${CIPHERTOOL_DB_PASSWORD:}
  sql:
    init:
      mode: ${CIPHERTOOL_SQL_INIT_MODE:always}
      encoding: UTF-8
  flyway:
    enabled: ${CIPHERTOOL_FLYWAY_ENABLED:false}
    locations: ${CIPHERTOOL_FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${CIPHERTOOL_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: true

# Aliyun SMS Config
# aliyun:
#   sms:
#     access-key-id: ${ALIYUN_ACCESS_KEY_ID}
#     access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
#     sign-name: ${ALIYUN_SMS_SIGN_NAME}
#     template-code: ${ALIYUN_SMS_TEMPLATE_CODE}

# Email Config
  mail:
    host: smtp.qq.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Auth Code Config
auth:
  code:
    length: 6
    expire-minutes: 5
    send-interval-seconds: 60
    max-send-per-hour: 5
  session:
    expire-hours: ${AUTH_SESSION_EXPIRE_HOURS:168}

# OpenAI-compatible LLM Config
llm:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.deepseek.com/v1}
  model: ${OPENAI_MODEL:deepseek-v4-flash}

# API Router quota, rate limit and optional internal billing config
api-router:
  admin-emails: ${API_ROUTER_ADMIN_EMAILS:}
  limit:
    rpm: ${API_ROUTER_RPM_LIMIT:60}
    tpm: ${API_ROUTER_TPM_LIMIT:120000}
  quota:
    default-tokens: ${API_ROUTER_DEFAULT_TOKEN_QUOTA:1000000}
  price:
    input-per-million: ${API_ROUTER_INPUT_PRICE_PER_MILLION:0}
    output-per-million: ${API_ROUTER_OUTPUT_PRICE_PER_MILLION:0}
  routing:
    retry-statuses: ${API_ROUTER_RETRY_STATUSES:429,500,502,503,504}
  health:
    probe-path: ${API_ROUTER_HEALTH_PROBE_PATH:/models}
    probe-timeout-seconds: ${API_ROUTER_HEALTH_PROBE_TIMEOUT_SECONDS:8}
    circuit-failure-threshold: ${API_ROUTER_CIRCUIT_FAILURE_THRESHOLD:3}
    circuit-open-minutes: ${API_ROUTER_CIRCUIT_OPEN_MINUTES:5}
  payment:
    callback-secret: ${API_ROUTER_PAYMENT_CALLBACK_SECRET:}
    callback-window-minutes: ${API_ROUTER_PAYMENT_CALLBACK_WINDOW_MINUTES:15}
    public-base-url: ${API_ROUTER_PUBLIC_BASE_URL:http://localhost:8080}
    order-expire-minutes: ${API_ROUTER_PAYMENT_ORDER_EXPIRE_MINUTES:30}
    checkout-url-template: ${API_ROUTER_PAYMENT_CHECKOUT_URL_TEMPLATE:}
    alipay-checkout-url-template: ${API_ROUTER_ALIPAY_CHECKOUT_URL_TEMPLATE:}
    wechat-checkout-url-template: ${API_ROUTER_WECHAT_CHECKOUT_URL_TEMPLATE:}
    stripe-checkout-url-template: ${API_ROUTER_STRIPE_CHECKOUT_URL_TEMPLATE:}
    manual-instructions: ${API_ROUTER_PAYMENT_MANUAL_INSTRUCTIONS:请联系管理员完成线下转账，并备注订单号。}
  risk:
    key-create-per-hour: ${API_ROUTER_RISK_KEY_CREATE_PER_HOUR:10}
    redeem-per-hour: ${API_ROUTER_RISK_REDEEM_PER_HOUR:20}
    order-create-per-hour: ${API_ROUTER_RISK_ORDER_CREATE_PER_HOUR:12}
    invalid-key-per-minute: ${API_ROUTER_RISK_INVALID_KEY_PER_MINUTE:30}

# CORS Config
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://127.0.0.1,file://,http://117.50.34.36,https://pzmno1.github.io}
  allowed-methods: GET,POST,OPTIONS
  allowed-headers: "*"
  max-age: 3600

logging:
  level:
    com.ciphertool: DEBUG
    root: INFO
