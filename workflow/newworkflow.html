<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博工作流构建器</title>
    <style>
        /* =========================================
           1. 基础样式 (保留赛博朋克风格)
           ========================================= */
        :root {
            --bg: #000000;
            --primary: #2ecc71;
            --secondary: #3498db;
            --accent: #9b59b6;
            --text: #ecf0f1;
            --card-bg: #2c3e50;
            --error: #e74c3c;
            --grid-size: 20px;
            --grid-color: rgba(64, 224, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui;
            user-select: none;
        }

        body {
            background: 
                radial-gradient(ellipse at 80% 20%, rgba(46, 204, 113, 0.08) 0%, transparent 30%) fixed,
                radial-gradient(ellipse at 20% 80%, rgba(52, 152, 219, 0.08) 0%, transparent 30%) fixed,
                linear-gradient(135deg, #00081d 0%, #0a0e2b 50%, #170a2a 100%) fixed;
            color: var(--text);
            line-height: 1.6;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                rgba(46, 204, 113, 0.05) 0%,   
                rgba(52, 152, 219, 0.1) 25%,  
                rgba(155, 89, 182, 0.05) 50%,  
                rgba(46, 204, 113, 0.05) 75%,
                rgba(52, 152, 219, 0.1) 100%
            );
            animation: flow 20s linear infinite;
            z-index: -2;
            transform: rotate(35deg);
            pointer-events: none;
            filter: blur(80px);
        }
        @keyframes flow {
            0% { transform: rotate(35deg) translateX(-100%); }
            100% { transform: rotate(35deg) translateX(100%); }
        }

        /* =========================================
           2. 画布与节点样式 (修改版)
           ========================================= */
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: center;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #connections-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: visible;
        }

        /* --- 节点样式 (加大) --- */
        .node {
            position: absolute;
            width: 320px; /* 增大宽度 */
            min-height: 180px; /* 增大高度 */
            z-index: 10;
            cursor: default;
            background: linear-gradient(145deg, 
                rgba(0, 9, 59, 0.9) 0%,    
                rgba(0, 163, 175, 0.2) 40%,      
                rgba(44, 40, 255, 0.15) 100%);
            background-color: #0a0e17;
            border-radius: 16px;
            box-shadow: 
                0 12px 40px rgba(0,0,0,0.6),  
                inset 0 0 20px rgba(64,224,255,0.05);  
            border: 1px solid rgba(64,224,255, 0.3);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .node:hover {
            border-color: rgba(64, 224, 255, 0.6);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7), inset 0 0 25px rgba(64,224,255,0.1);
        }

        .node.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.3), 0 0 20px rgba(46, 204, 113, 0.2);
        }

        /* 节点头部 */
        .node-header {
            padding: 12px 18px;
            background: rgba(64, 224, 255, 0.08);
            border-bottom: 1px solid rgba(64, 224, 255, 0.15);
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .node-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .node-status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .node-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            outline: none;
            border-bottom: 1px solid transparent;
        }
        .node-title:focus {
            border-bottom: 1px solid var(--secondary);
        }

        /* 删除按钮 (直接放在卡片上) */
        .node-delete-btn {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #ffadad;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .node-delete-btn:hover {
            background: rgba(231, 76, 60, 0.8);
            color: white;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .node-content {
            padding: 18px;
            flex-grow: 1;
        }
        
        .node-content textarea {
            background: rgba(0,0,0,0.2);
            border: 1px solid transparent;
            border-radius: 8px;
            color: rgba(255,255,255,0.9);
            width: 100%;
            height: 100%;
            resize: none;
            font-size: 1rem;
            padding: 8px;
            min-height: 80px;
        }
        
        .node-content textarea:focus {
            background: rgba(0,0,0,0.4);
            border-color: rgba(64, 224, 255, 0.3);
            outline: none;
        }

        /* --- 端口 (加大) --- */
        .port {
            width: 24px; /* 增大尺寸 */
            height: 24px;
            background: #0b1019;
            border: 3px solid var(--secondary); /* 加粗边框 */
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            cursor: crosshair;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .port:hover {
            transform: scale(1.3);
            background: #fff;
        }

        .port-in {
            left: -12px; /* 调整位置以适应新尺寸 */
            top: 50%;
            margin-top: -12px;
            border-color: var(--primary);
        }
        
        .port-out {
            right: -12px;
            top: 50%;
            margin-top: -12px;
            border-color: var(--accent);
        }

        /* 连线 */
        path.connection {
            fill: none;
            stroke: var(--secondary);
            stroke-width: 3; /* 加粗连线 */
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px rgba(52, 152, 219, 0.6));
            cursor: pointer;
            transition: stroke 0.2s;
        }

        path.connection:hover {
            stroke: #fff;
            stroke-width: 5;
            z-index: 99;
        }

        path.drag-line {
            fill: none;
            stroke: rgba(255,255,255,0.6);
            stroke-width: 3;
            stroke-dasharray: 8,4;
            pointer-events: none;
        }

        /* =========================================
           3. 底部浮动工具栏 (替代侧边栏)
           ========================================= */
        .toolbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 26, 43, 0.85);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(64, 224, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(64,224,255,0.1);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tool-btn:hover {
            background: rgba(64, 224, 255, 0.15);
            border-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
            text-shadow: 0 0 8px rgba(64,224,255,0.8);
        }

        .tool-btn.btn-start { border-color: rgba(46, 204, 113, 0.4); }
        .tool-btn.btn-start:hover { background: rgba(46, 204, 113, 0.15); border-color: var(--primary); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }

        .tool-btn.btn-end { border-color: rgba(231, 76, 60, 0.4); }
        .tool-btn.btn-end:hover { background: rgba(231, 76, 60, 0.15); border-color: var(--error); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }

        .btn-clear {
            border-color: rgba(255,255,255,0.2);
            color: #aaa;
        }
        .btn-clear:hover {
            color: #fff;
            border-color: #fff;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 30, 0.9);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 30px;
            border-radius: 4px;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
        }
        .toast.show { opacity: 1; }

    </style>
</head>
<body>

    <!-- 画布区域 -->
    <div id="canvas-container">
        <div id="transform-layer" style="transform-origin: 0 0; width: 100%; height: 100%;">
            <!-- 连线绘制层 -->
            <svg id="connections-layer">
                <!-- 连线将通过 JS 动态添加 -->
            </svg>
            <!-- 节点将通过 JS 动态添加在这里 -->
        </div>
    </div>

    <!-- 底部悬浮工具栏 (替代侧边栏) -->
    <div class="toolbar">
        <button class="tool-btn btn-start" onclick="createNode('start')">▶ 开始</button>
        <button class="tool-btn" onclick="createNode('process')">⚙ 流程</button>
        <button class="tool-btn btn-end" onclick="createNode('end')">■ 结束</button>
        <div style="width: 1px; background: rgba(255,255,255,0.2); margin: 0 5px;"></div>
        <button class="tool-btn btn-clear" onclick="clearCanvas()">🗑 清空</button>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast">SYSTEM READY</div>

    <script>
        // =========================================
        // 状态管理
        // =========================================
        
        const state = {
            nodes: [],
            connections: [],
            nextNodeId: 1,
            nextConnId: 1,
            isDraggingNode: false,
            draggedNodeId: null,
            dragOffset: { x: 0, y: 0 },
            isDrawingLine: false,
            lineStartNodeId: null,
            lineStartPos: { x: 0, y: 0 },
            selectedElement: null, 
            pan: { x: 0, y: 0 },
            isPanning: false,
            lastMousePos: { x: 0, y: 0 }
        };

        const canvas = document.getElementById('canvas-container');
        const transformLayer = document.getElementById('transform-layer');
        const svgLayer = document.getElementById('connections-layer');
        const toastEl = document.getElementById('toast');

        // =========================================
        // 节点逻辑
        // =========================================

        function createNode(type) {
            const id = state.nextNodeId++;
            // 在视口中心创建
            const centerX = (window.innerWidth / 2 - state.pan.x) - 160; // 宽度的一半
            const centerY = (window.innerHeight / 2 - state.pan.y) - 90; // 高度的一半
            
            const x = centerX + (Math.random() * 60 - 30);
            const y = centerY + (Math.random() * 60 - 30);

            let title = "新节点";
            let color = "var(--secondary)";
            let content = "点击输入内容...";

            if (type === 'start') {
                title = "开始节点";
                color = "var(--primary)";
            } else if (type === 'end') {
                title = "结束节点";
                color = "var(--error)";
            }

            const nodeData = { id, x, y, type, title, content };
            state.nodes.push(nodeData);
            
            renderNode(nodeData, color);
            showToast('NODE CREATED');
        }

        function renderNode(data, colorStr) {
            const el = document.createElement('div');
            el.className = 'node';
            el.id = `node-${data.id}`;
            el.style.left = `${data.x}px`;
            el.style.top = `${data.y}px`;
            if (colorStr) el.style.borderColor = colorStr;

            // HTML 结构 - 包含右上角的删除按钮
            el.innerHTML = `
                <div class="node-header" onmousedown="startDragNode(event, ${data.id})">
                    <div class="node-title-group">
                        <div class="node-status-dot" style="color: ${colorStr || '#fff'}; background: ${colorStr || '#fff'}"></div>
                        <div class="node-title" contenteditable="true" onblur="updateNodeTitle(${data.id}, this)">${data.title}</div>
                    </div>
                    <button class="node-delete-btn" onclick="deleteNode(event, ${data.id})" title="删除节点">✕</button>
                </div>
                <div class="node-content">
                    <textarea oninput="updateNodeContent(${data.id}, this)">${data.content}</textarea>
                </div>
                <!-- 端口 (事件绑定) -->
                <div class="port port-in" onmouseup="endConnection(${data.id})" title="输入"></div>
                <div class="port port-out" onmousedown="startConnection(event, ${data.id})" title="输出"></div>
            `;

            el.addEventListener('mousedown', (e) => {
                // 点击节点本身也会选中（非拖拽区域）
                if(e.target.closest('.node-content')) {
                    selectElement('node', data.id);
                }
            });

            transformLayer.appendChild(el);
        }

        function deleteNode(e, id) {
            e.stopPropagation(); // 防止触发拖拽或选中
            
            // 从 DOM 移除
            const el = document.getElementById(`node-${id}`);
            if (el) {
                // 添加消失动画
                el.style.transform = "scale(0.8)";
                el.style.opacity = "0";
                setTimeout(() => el.remove(), 200);
            }

            // 从数据移除
            state.nodes = state.nodes.filter(n => n.id !== id);
            
            // 移除相关连线
            state.connections = state.connections.filter(c => c.fromNode !== id && c.toNode !== id);
            
            renderConnections();
            showToast('NODE DELETED');
        }

        function updateNodeTitle(id, el) {
            const node = state.nodes.find(n => n.id === id);
            if (node) node.title = el.innerText;
        }

        function updateNodeContent(id, el) {
            const node = state.nodes.find(n => n.id === id);
            if (node) node.content = el.value;
        }

        function startDragNode(e, id) {
            if (e.target.tagName === 'BUTTON' || e.target.closest('.node-delete-btn')) return; // 防止点到删除按钮
            e.stopPropagation();
            state.isDraggingNode = true;
            state.draggedNodeId = id;
            
            const nodeEl = document.getElementById(`node-${id}`);
            const rect = nodeEl.getBoundingClientRect();
            state.dragOffset = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            selectElement('node', id);
        }

        // =========================================
        // 连线逻辑
        // =========================================

        function startConnection(e, nodeId) {
            e.stopPropagation();
            state.isDrawingLine = true;
            state.lineStartNodeId = nodeId;
            
            const portOut = document.querySelector(`#node-${nodeId} .port-out`);
            const rect = portOut.getBoundingClientRect();
            
            state.lineStartPos = {
                x: (rect.left + rect.width / 2) - state.pan.x,
                y: (rect.top + rect.height / 2) - state.pan.y
            };

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("class", "drag-line");
            path.setAttribute("id", "drag-line-temp");
            svgLayer.appendChild(path);
        }

        function endConnection(targetNodeId) {
            if (!state.isDrawingLine) return;
            
            if (state.lineStartNodeId === targetNodeId) {
                cancelConnection();
                return;
            }

            const exists = state.connections.some(c => 
                c.fromNode === state.lineStartNodeId && c.toNode === targetNodeId
            );

            if (!exists) {
                const connId = state.nextConnId++;
                state.connections.push({
                    id: connId,
                    fromNode: state.lineStartNodeId,
                    toNode: targetNodeId
                });
                renderConnections();
                showToast('CONNECTED');
            }

            cancelConnection();
        }

        function cancelConnection() {
            state.isDrawingLine = false;
            state.lineStartNodeId = null;
            const temp = document.getElementById('drag-line-temp');
            if (temp) temp.remove();
        }

        function renderConnections() {
            const tempLine = document.getElementById('drag-line-temp');
            svgLayer.innerHTML = '';
            if (tempLine) svgLayer.appendChild(tempLine);

            state.connections.forEach(conn => {
                const fromEl = document.querySelector(`#node-${conn.fromNode} .port-out`);
                const toEl = document.querySelector(`#node-${conn.toNode} .port-in`);

                if (fromEl && toEl) {
                    const fromRect = fromEl.getBoundingClientRect();
                    const toRect = toEl.getBoundingClientRect();

                    const x1 = (fromRect.left + fromRect.width / 2) - state.pan.x;
                    const y1 = (fromRect.top + fromRect.height / 2) - state.pan.y;
                    const x2 = (toRect.left + toRect.width / 2) - state.pan.x;
                    const y2 = (toRect.top + toRect.height / 2) - state.pan.y;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("class", "connection");
                    
                    // 点击删除连线
                    path.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('删除此连线?')) {
                            state.connections = state.connections.filter(c => c.id !== conn.id);
                            renderConnections();
                        }
                    });

                    path.setAttribute("d", getBezierPath(x1, y1, x2, y2));
                    svgLayer.appendChild(path);
                }
            });
        }

        function getBezierPath(x1, y1, x2, y2) {
            const dist = Math.abs(x2 - x1) * 0.5 + 50; 
            const cp1x = x1 + dist; 
            const cp1y = y1;
            const cp2x = x2 - dist;
            const cp2y = y2;
            return `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
        }

        // =========================================
        // 全局事件
        // =========================================

        document.addEventListener('mousemove', (e) => {
            if (state.isDraggingNode && state.draggedNodeId) {
                const node = state.nodes.find(n => n.id === state.draggedNodeId);
                if (node) {
                    node.x = e.clientX - state.dragOffset.x - state.pan.x;
                    node.y = e.clientY - state.dragOffset.y - state.pan.y;
                    
                    const el = document.getElementById(`node-${node.id}`);
                    el.style.left = `${node.x}px`;
                    el.style.top = `${node.y}px`;
                    
                    renderConnections();
                }
            }

            if (state.isDrawingLine) {
                const tempLine = document.getElementById('drag-line-temp');
                const mouseX = e.clientX - state.pan.x;
                const mouseY = e.clientY - state.pan.y;
                
                const d = getBezierPath(
                    state.lineStartPos.x, state.lineStartPos.y,
                    mouseX, mouseY
                );
                tempLine.setAttribute("d", d);
            }

            if (state.isPanning) {
                const dx = e.clientX - state.lastMousePos.x;
                const dy = e.clientY - state.lastMousePos.y;
                state.pan.x += dx;
                state.pan.y += dy;
                
                updatePan();
                state.lastMousePos = { x: e.clientX, y: e.clientY };
            }
        });

        document.addEventListener('mouseup', () => {
            state.isDraggingNode = false;
            state.draggedNodeId = null;
            state.isPanning = false;
            if (state.isDrawingLine) cancelConnection();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.target === canvas || e.target === transformLayer || e.target === svgLayer) {
                state.isPanning = true;
                state.lastMousePos = { x: e.clientX, y: e.clientY };
                selectElement(null);
            }
        });

        function updatePan() {
            transformLayer.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px)`;
            canvas.style.backgroundPosition = `${state.pan.x}px ${state.pan.y}px`;
        }

        function selectElement(type, id) {
            document.querySelectorAll('.node.selected').forEach(el => el.classList.remove('selected'));
            state.selectedElement = type ? { type, id } : null;
            if (type === 'node') {
                const el = document.getElementById(`node-${id}`);
                if (el) el.classList.add('selected');
            }
        }

        function clearCanvas() {
            if(confirm("确定要清空画布吗？")) {
                state.nodes = [];
                state.connections = [];
                transformLayer.innerHTML = '<svg id="connections-layer"></svg>'; 
                document.querySelectorAll('.node').forEach(n => n.remove());
                showToast('CANVAS CLEARED');
            }
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 1500);
        }

        // 初始化
        window.onload = () => {
            createNode('start');
        };

    </script>
</body>
</html>
